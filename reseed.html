async function doClear() {
  ['btn-all','btn-clear','btn-seed'].forEach(id => document.getElementById(id).disabled = true);
  log('🗑️ 清空目錄中…');
  try {
    await remove(ref(db, 'catalog'));
    log('✅ 目錄已清空', 'ok');
  } catch(e) {
    log('❌ 清空失敗: ' + e.message, 'err');
  }
  ['btn-all','btn-clear','btn-seed'].forEach(id => document.getElementById(id).disabled = false);
}

async function doSeed() {
  ['btn-all','btn-clear','btn-seed'].forEach(id => document.getElementById(id).disabled = true);
  log('📥 匯入 ' + SEED.length + ' 筆資料中…');
  let ok = 0, fail = 0;
  for (const item of SEED) {
    try {
      await push(ref(db, 'catalog'), item);
      ok++;
      if (ok % 50 === 0) log(`  ✔ ${ok} / ${SEED.length} 筆…`);
    } catch(e) {
      fail++;
      log('❌ 失敗: ' + JSON.stringify(item).slice(0,60) + ' — ' + e.message, 'err');
    }
  }
  log(`✅ 完成！成功 ${ok} 筆，失敗 ${fail} 筆`, 'ok');
  ['btn-all','btn-clear','btn-seed'].forEach(id => document.getElementById(id).disabled = false);
}

async function doAll() {
  ['btn-all','btn-clear','btn-seed'].forEach(id => document.getElementById(id).disabled = true);
  log('⚡ 清空 + 匯入中…');
  try {
    await remove(ref(db, 'catalog'));
    log('✅ 目錄已清空', 'ok');
  } catch(e) {
    log('❌ 清空失敗: ' + e.message, 'err');
    ['btn-all','btn-clear','btn-seed'].forEach(id => document.getElementById(id).disabled = false);
    return;
  }
  let ok = 0, fail = 0;
  for (const item of SEED) {
    try {
      await push(ref(db, 'catalog'), item);
      ok++;
      if (ok % 50 === 0) log(`  ✔ ${ok} / ${SEED.length} 筆…`);
    } catch(e) {
      fail++;
      log('❌ 失敗: ' + JSON.stringify(item).slice(0,60), 'err');
    }
  }
  log(`✅ 完成！共 ${ok} 筆已匯入`, 'ok');
  ['btn-all','btn-clear','btn-seed'].forEach(id => document.getElementById(id).disabled = false);
}

window.doAll   = doAll;
window.doClear = doClear;
window.doSeed  = doSeed;
</script>
